<html lang="de">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Grundfarben und Styles -->
    <style>
        :root {

            --blue: #1976d2;

            --dark: #263238;
            --accent: #ffa000;

            --card-bg: #ffffff;
            --text: #263238;
            --muted: #607d8b;
            --danger: #c62828;
            --success: #2e7d32;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px;
            --transition-fast: 0.2s ease;
        }

        body.dark {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #f5f5f5;
            --muted: #b0bec5;
            --shadow-soft: 0 4px 18px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        /* Layout */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        body.dark header {

            border-color: rgba(255,255,255,0.08);
        }

            justify-content: space-between;
            gap: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .logo-circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--green), var(--blue));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 3px 7px rgba(0,0,0,0.25);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text span:first-child {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .logo-text span:last-child {
            font-size: 0.75rem;
            color: var(--muted);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 0.2rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links button {
            border: none;
            background: transparent;
            padding: 0.35rem 0.6rem;
            border-radius: 999px;
            font-size: 0.78rem;
            cursor: pointer;
            color: var(--muted);
            transition: background var(--transition-fast), color var(--transition-fast), transform var(--transition-fast);
        }

        .nav-links button:hover {
            background: rgba(25,118,210,0.1);
            color: var(--blue);
            transform: translateY(-1px);
        }

        .nav-links button.active {
            background: var(--blue);
            color: #fff;
        }

        .controls {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .select-small, .toggle-btn {
            font-size: 0.78rem;
        }

        .select-small {
            padding: 0.35rem 0.6rem;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--card-bg);
            color: var(--text);
        }

        body.dark .select-small {
            border-color: rgba(255,255,255,0.1);
        }

        .toggle-btn {
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.1);
            background: var(--card-bg);
            color: var(--text);
            padding: 0.3rem 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
        }

        body.dark .toggle-btn {
            border-color: rgba(255,255,255,0.1);
        }

        .toggle-btn span.icon {
            font-size: 0.9rem;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 1rem 3.5rem 1rem;
        }

        section {

        .page-section {

        .page-section.active {

        .hero-text p {

            padding: 1.1rem 1.1rem 1.15rem;
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }

        .hero-card h3 {
            margin-top: 0;
            margin-bottom: 0.4rem;
            font-size: 0.98rem;
        }

        .hero-grid {

            grid-template-columns: repeat(3, minmax(0,1fr));
            gap: 0.35rem;
            font-size: 0.8rem;
        }

        .hero-mini-card {
            border-radius: 12px;
            background: rgba(255,255,255,0.72);
            padding: 0.35rem 0.5rem;
            border: 1px solid rgba(46,125,50,0.12);
        }

        body.dark .hero-card {

        .hero-stat {

            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .btn-primary, .btn-secondary, .btn-ghost {
            border-radius: 999px;
            padding: 0.45rem 0.95rem;
            border: none;
            cursor: pointer;
            font-size: 0.86rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast), color var(--transition-fast);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--green), var(--blue));
            color: #fff;
        }

        .btn-secondary {
            background: var(--sand);
            color: var(--dark);
        }

        .btn-ghost {
            background: transparent;
            color: var(--blue);
            box-shadow: none;
            border: 1px solid rgba(25,118,210,0.32);
        }

        .btn-primary:hover, .btn-secondary:hover, .btn-ghost:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
        }

        .btn-ghost:hover {
            background: rgba(25,118,210,0.06);
        }

        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.78rem;
        }

        /* Sektionen allgemein */
        h2.section-title {
            font-size: 1.3rem;
            margin-bottom: 0.35rem;
            color: var(--green);
        }

        .section-subtitle {
            font-size: 0.86rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1rem;
            box-shadow: var(--shadow-soft);
        }

            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));

        }
